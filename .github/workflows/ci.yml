# =============================================================================
# CI ワークフロー
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"

jobs:
  # ===========================================================================
  # Backend Lint
  # ===========================================================================
  backend-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -e ".[dev]" yamllint taplo

      - name: Requirements sync
        run: python scripts/sync_requirements.py --check

      - name: Spell check
        run: npm run lint:spell

      - name: JSON lint
        run: npm run lint:json

      - name: YAML lint
        run: yamllint -s .

      - name: TOML lint
        run: taplo check pyproject.toml

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff check
        run: ruff check src tests

      - name: mypy
        run: mypy src

  # ===========================================================================
  # Backend Test
  # ===========================================================================
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: discord_util_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d discord_util_bot_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -e ".[dev]"

      - name: pytest
        run: pytest -n auto --cov=src --cov-report=term-missing --cov-report=xml -v
        env:
          DISCORD_TOKEN: test_token
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost/discord_util_bot_test
          TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost/discord_util_bot_test
          TEST_DATABASE_URL_SYNC: postgresql://test_user:test_password@localhost/discord_util_bot_test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # Frontend Lint
  # ===========================================================================
  frontend-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - name: tsc
        run: cd frontend && npm run tsc

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Prettier
        run: cd frontend && npm run format:check

      - name: cspell
        run: cd frontend && npm run spell

  # ===========================================================================
  # Frontend Test
  # ===========================================================================
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - name: Vitest
        run: cd frontend && npm run test:run

  # ===========================================================================
  # Frontend Build (after lint + test)
  # ===========================================================================
  frontend-build:
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
