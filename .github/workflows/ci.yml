# =============================================================================
# CI ワークフロー
# =============================================================================
#
# このワークフローは、コードの品質を自動的にチェックする。
# push/PR 時に実行され、以下の検証を行う:
#
# [backend-lint ジョブ] (PostgreSQL 不要 -- 高速)
#   1. requirements.txt 同期チェック
#   2. スペルチェック (cspell)
#   3. JSON/YAML/TOML の構文チェック
#   4. Python コードのフォーマットチェック (Ruff format)
#   5. Python コードの静的解析 (Ruff check)
#   6. 型チェック (mypy)
#
# [backend-test ジョブ] (PostgreSQL 必要)
#   7. ユニットテスト (pytest + xdist 並列実行)
#   8. カバレッジレポート (Codecov)
#
# [frontend-lint ジョブ] (Node.js のみ)
#   9. TypeScript 型チェック (tsc)
#  10. ESLint
#  11. Prettier フォーマットチェック
#  12. スペルチェック (cspell)
#
# [frontend-test ジョブ] (Node.js のみ)
#  13. Vitest ユニットテスト
#
# [frontend-build ジョブ] (frontend-lint + frontend-test 完了後)
#  14. Next.js ビルド
#
# 注意:
# - ローカルからの手動デプロイは禁止 (バージョン齟齬・テスト見逃し防止)
# - デプロイは GitHub Actions から手動トリガーで実行
# =============================================================================

name: CI

# -----------------------------------------------------------------------------
# トリガー設定
# -----------------------------------------------------------------------------
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===========================================================================
  # Backend Lint ジョブ -- PostgreSQL 不要、高速
  # ===========================================================================
  backend-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js with Volta
        uses: volta-cli/action@v4

      - name: Install Node.js dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" yamllint taplo

      - name: Check requirements.txt sync
        run: python scripts/sync_requirements.py --check

      - name: Spell check with cspell
        run: npm run lint:spell

      - name: Lint JSON
        run: npm run lint:json

      - name: Lint YAML
        run: yamllint -s .

      - name: Lint TOML
        run: taplo check pyproject.toml

      - name: Format check with Ruff
        run: ruff format --check .

      - name: Lint with Ruff
        run: ruff check src tests

      - name: Type check with mypy
        run: mypy src

  # ===========================================================================
  # Backend Test ジョブ -- PostgreSQL + pytest-xdist 並列実行
  # ===========================================================================
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: discord_util_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d discord_util_bot_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest -n auto --cov=src --cov-report=term-missing --cov-report=xml -v
        env:
          DISCORD_TOKEN: test_token
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost/discord_util_bot_test
          TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost/discord_util_bot_test
          TEST_DATABASE_URL_SYNC: postgresql://test_user:test_password@localhost/discord_util_bot_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================================================
  # Frontend Lint ジョブ -- Node.js のみ
  # ===========================================================================
  frontend-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js with Volta
        uses: volta-cli/action@v4

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript type check
        run: cd frontend && npm run tsc

      - name: Lint with ESLint
        run: cd frontend && npm run lint

      - name: Format check with Prettier
        run: cd frontend && npm run format:check

      - name: Spell check with cspell
        run: cd frontend && npm run spell

  # ===========================================================================
  # Frontend Test ジョブ -- Node.js のみ
  # ===========================================================================
  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js with Volta
        uses: volta-cli/action@v4

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests with Vitest
        run: cd frontend && npm run test:run

  # ===========================================================================
  # Frontend Build ジョブ -- lint + test 完了後に実行
  # ===========================================================================
  frontend-build:
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js with Volta
        uses: volta-cli/action@v4

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build Next.js
        run: cd frontend && npm run build
